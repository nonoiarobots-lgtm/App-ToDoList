name: Sauvegarde BDD

# Sauvegarde quotidienne et chiffrée de la base Supabase, stockée comme artifact privé
# (rétention 90 jours). Aucun dump n'est commité dans ce dépôt public.
#
# Connexion via les paramètres PG* : seul le mot de passe est un secret (le reste,
# non sensible, est en dur ci-dessous). Évite tout problème d'encodage d'URL.
#
# Secrets requis (repo → Settings → Secrets and variables → Actions) :
#   - SUPABASE_DB_PASSWORD : mot de passe BRUT de la base (sans "postgresql://", sans @)
#   - BACKUP_PASSPHRASE    : phrase secrète de chiffrement (à conserver précieusement)
#
# Restauration : voir docs/restauration-backup.md

on:
  schedule:
    - cron: '23 2 * * *' # tous les jours à 02:23 UTC
  workflow_dispatch: {} # déclenchement manuel possible

jobs:
  backup:
    runs-on: ubuntu-latest
    env:
      # Paramètres non sensibles (Session pooler, IPv4) — host confirmé joignable
      PGHOST: aws-0-eu-west-3.pooler.supabase.com
      PGPORT: '5432'
      PGUSER: postgres.gtyinljbotgcxinjfgjc
      PGDATABASE: postgres
      PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      BACKUP_PASSPHRASE: ${{ secrets.BACKUP_PASSPHRASE }}
    steps:
      - name: Dump PostgreSQL + chiffrement
        run: |
          set -eo pipefail
          if [ -z "$PGPASSWORD" ] || [ -z "$BACKUP_PASSPHRASE" ]; then
            echo "::error::Secrets SUPABASE_DB_PASSWORD et/ou BACKUP_PASSPHRASE manquants"
            exit 1
          fi
          fichier="backup-$(date +%Y-%m-%d).sql.gz.gpg"
          # pg_dump via l'image postgres:17 (version alignée sur le serveur Supabase) ;
          # les variables PG* sont transmises au conteneur.
          docker run --rm \
            -e PGHOST -e PGPORT -e PGUSER -e PGDATABASE -e PGPASSWORD \
            postgres:17 \
            pg_dump --no-owner --no-privileges \
            | gzip \
            | gpg --batch --yes --symmetric --cipher-algo AES256 \
                  --passphrase "$BACKUP_PASSPHRASE" -o "$fichier"
          taille=$(stat -c%s "$fichier")
          if [ "$taille" -lt 1000 ]; then
            echo "::error::Dump suspicieusement petit ($taille octets) — échec probable"
            exit 1
          fi
          echo "Sauvegarde créée : $fichier ($taille octets)"
          echo "FICHIER=$fichier" >> "$GITHUB_ENV"

      - name: Upload de l'artifact (chiffré, privé)
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: ${{ env.FICHIER }}
          retention-days: 90
